apiVersion: apps/v1
kind: Deployment
metadata:
  name: moviebooking
  # REMOVE namespace line from base — overlays set it
spec:
  replicas: 2
  selector:
    matchLabels:
      app: moviebooking
  template:
    metadata:
      labels:
        app: moviebooking
    spec:
      containers:
      - name: moviebooking
        image: 873961273010.dkr.ecr.ap-south-2.amazonaws.com/moviebooking:e53da61
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: moviebooking-config
        env:
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: moviebooking-secrets
              key: DB_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: moviebooking-secrets
              key: JWT_SECRET
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/movies
            port: 8080
          initialDelaySeconds: 40
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /api/movies
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10